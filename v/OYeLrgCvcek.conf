title = "No need to make big bets in this market just yet"
description = "Victoria Fernandez, chief market strategist at Crossmark Global Investments, joins BNN Bloomberg for her view on the stock market. Fernandez says the elements that support the economy do not help central banks’ inflation fight. Fernandez also discusses Nordstrom winding down Canadian operations, advising investors to be selective when choosing retail names as some will do better than others. Furthermore, she likes staples and cyclical names and advises not to make big bets in this market, instead focusing on a balanced portfolio.\n\nSubscribe to BNN Bloomberg to watch more videos: https://www.youtube.com/BNNBloomberg\n\nConnect with BNN Bloomberg: \nFor the latest news visit: https://www.bnnbloomberg.ca\nFor a full video offering visit BNN Bloomberg: https://www.bnnbloomberg.ca/video\nBNN Bloomberg on Facebook: https://www.facebook.com/BNNBloomberg \nBNN Bloomberg on Twitter: https://twitter.com/bnnbloomberg \nBNN Bloomberg on Instagram: https://www.instagram.com/bnnbloomberg \nBNN Bloomberg on LinkedIn: https://www.linkedin.com/company/bnn-bloomberg\n--\nBNN Bloomberg is Canada’s only TV service devoted exclusively to business, finance and the markets."
